<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shadow Arena</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="top">
  <h1>🌑 Shadow Arena</h1>
  <p id="stats"></p>
</div>

<div class="screen" id="screen">
  <p>Choose action</p>
</div>

<div class="actions">
  <button onclick="fight()">⚔ Fight</button>
  <button onclick="openChest()">🧰 Chest</button>
  <button onclick="shop()">🛒 Shop</button>
  <button onclick="boss()">👹 Boss</button>
</div>

<div class="bottom">
  <button onclick="tab('inv')">Inventory</button>
  <button onclick="tab('char')">Character</button>
  <button onclick="tab('world')">Worlds</button>
  <button onclick="tab('pvp')">PvP</button>
</div>

<script src="game.js"></script>
</body>
</html>
