<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shadow Arena</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="topbar">
    <div class="logo">🌑 SHADOW ARENA</div>
    <div id="stats" class="stats">Loading...</div>
  </div>

  <!-- SCREEN -->
  <div class="screen" id="screen">
    <h2>Welcome Warrior</h2>

    <div id="hpBar">
      <div id="hpFill"></div>
    </div>

    <p>Choose action below</p>
  </div>

  <!-- ACTIONS -->
  <div class="actions">
    <button onclick="fight()">⚔ Fight</button>
    <button onclick="openChest()">🧰 Chest</button>
    <button onclick="shop()">🛒 Shop</button>
    <button onclick="boss()">👹 Boss</button>
  </div>

  <!-- BOTTOM NAV -->
  <div class="navbar">
    <button onclick="tab('inv')">🎒</button>
    <button onclick="tab('char')">🧍</button>
    <button onclick="tab('world')">🌍</button>
    <button onclick="tab('pvp')">⚔️</button>
  </div>

</div>

<script src="game.js"></script>

</body>
</html>
